name: CI Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cmake_generator: "Unix Makefiles"
            bin_dir: "build"
            exe_suffix: ""
          - os: macos-latest
            cmake_generator: "Unix Makefiles"
            bin_dir: "build"
            exe_suffix: ""
          - os: windows-latest
            cmake_generator: "Visual Studio 17 2022"
            bin_dir: "build/Release"
            exe_suffix: ".exe"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: |
          cmake -B build -G "${{ matrix.cmake_generator }}" -DRS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run CTest
        working-directory: build
        run: ctest --output-on-failure -C Release

      - name: Smoke-test example binaries
        shell: bash
        env:
          BIN_DIR: ${{ matrix.bin_dir }}
          EXE: ${{ matrix.exe_suffix }}
        run: |
          set -e
          # Targets that accept --help and exit cleanly enough for a smoke test.
          # We only check that the binary launches and exits with a non-signal
          # status (< 128). Some examples return 1 from --help by design.
          TARGETS=(
            rs-asr-offline
            rs-asr-vad-online
            rs-speaker-id
            rs-tts-offline
            rs-tts-split
            rs-imatrix
            rs-quantize
          )
          for t in "${TARGETS[@]}"; do
            bin="${BIN_DIR}/${t}${EXE}"
            if [ ! -x "$bin" ] && [ ! -f "$bin" ]; then
              echo "MISSING: $bin"
              exit 1
            fi
            echo "=== $t --help ==="
            set +e
            "$bin" --help
            rc=$?
            set -e
            # rc >= 128 means killed by signal (segfault, abort, etc.)
            if [ "$rc" -ge 128 ]; then
              echo "FAIL: $t crashed with exit code $rc"
              exit 1
            fi
            echo "ok ($t exit=$rc)"
          done

  configure-backends:
    name: Configure ${{ matrix.backend }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            backend: vulkan
            cmake_flags: "-DRS_VULKAN=ON"
          - os: ubuntu-22.04
            backend: cuda
            cmake_flags: "-DRS_CUDA=ON"
          - os: macos-latest
            backend: metal
            cmake_flags: "-DRS_METAL=ON"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Vulkan SDK (Linux)
        if: matrix.backend == 'vulkan'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev glslang-tools glslc \
                                  vulkan-utility-libraries-dev spirv-tools

      - name: Install CUDA toolkit (Linux)
        if: matrix.backend == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.20
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev"]'

      - name: Install cuBLAS (Linux)
        if: matrix.backend == 'cuda'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcublas-12-4 libcublas-dev-12-4

      - name: Configure only (verify CMake options)
        run: |
          cmake -B build-${{ matrix.backend }} \
                ${{ matrix.cmake_flags }} \
                -DRS_BUILD_TESTS=OFF \
                -DRS_BUILD_CLI=OFF \
                -DGGML_NATIVE=OFF \
                -DCMAKE_CUDA_ARCHITECTURES="70;75;80;86;89"

  python-bindings-test:
    name: Python Bindings (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 cmake setuptools setuptools_scm wheel numpy

      - name: Build and install Python package
        env:
          # setuptools_scm appends `.d<date>` to the version when the working
          # tree is dirty. Building writes _version.py (a tracked file), which
          # dirties the tree mid-build, so pip's recorded version diverges from
          # the wheel filename and pip >=24 rejects the install. Pin a stable
          # version to sidestep the whole interaction.
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0.dev0"
        run: |
          pip install . -v

      - name: Verify Python import
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import rapidspeech; print('rapidspeech imported successfully')"
